<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="TaskFlow — A modern To-Do List app to manage your tasks with date and time tracking." />
    <title>TaskFlow — Smart To-Do List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Decorative background orbs -->
    <div class="orb orb-1" aria-hidden="true"></div>
    <div class="orb orb-2" aria-hidden="true"></div>
    <div class="orb orb-3" aria-hidden="true"></div>

    <div class="app-wrapper">

      <!-- ══════════════════════════════════════
           PAGE 1 — Task List (default view)
      ══════════════════════════════════════ -->
      <div class="page" id="page-list">

        <!-- ── Header ── -->
        <header class="app-header">
          <div class="header-left">
            <span class="logo-icon" aria-hidden="true">✦</span>
            <h1 class="app-title">TaskFlow</h1>
          </div>
          <!-- Add task button lives in the top-right corner -->
          <button class="btn-add-nav" id="go-to-add" aria-label="Add new task">
            <span class="btn-add-nav-icon" aria-hidden="true">＋</span>
            <span class="btn-add-nav-label">Add Task</span>
          </button>
        </header>

        <p class="app-subtitle">Stay organised · Get things done</p>

        <!-- ── Stats Bar ── -->
        <section class="stats-bar" aria-label="Task statistics">
          <div class="stat-card">
            <span class="stat-number" id="total-count">0</span>
            <span class="stat-label">Total</span>
          </div>
          <div class="stat-card pending-card">
            <span class="stat-number" id="pending-count">0</span>
            <span class="stat-label">Pending</span>
          </div>
          <div class="stat-card done-card">
            <span class="stat-number" id="done-count">0</span>
            <span class="stat-label">Completed</span>
          </div>
          <div class="stat-card overdue-card">
            <span class="stat-number" id="overdue-count">0</span>
            <span class="stat-label">Overdue</span>
          </div>
        </section>

        <!-- ── Controls: Filter & Sort ── -->
        <div class="controls-row">
          <div class="filter-group" role="group" aria-label="Filter tasks">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
            <button class="filter-btn" data-filter="overdue">Overdue</button>
          </div>

          <div class="sort-group">
            <label for="sort-select" class="sort-label">Sort:</label>
            <select id="sort-select" class="sort-select">
              <option value="datetime">By Date &amp; Time</option>
              <option value="newest">Newest Added</option>
              <option value="oldest">Oldest Added</option>
            </select>
          </div>
        </div>

        <!-- ── Task List ── -->
        <main>
          <ul class="task-list" id="task-list" aria-live="polite" aria-label="Task list"></ul>

          <!-- Empty state -->
          <div class="empty-state hidden" id="empty-state">
            <div class="empty-icon">🎯</div>
            <h3>No tasks yet!</h3>
            <p>Hit the <strong>＋ Add Task</strong> button above to get started.</p>
          </div>
        </main>

        <!-- ── Footer ── -->
        <footer class="app-footer">
          <p>TaskFlow &copy; 2026 &mdash; Tasks saved in your browser&apos;s localStorage.</p>
        </footer>

      </div><!-- /#page-list -->


      <!-- ══════════════════════════════════════
           PAGE 2 — Add Task Form
      ══════════════════════════════════════ -->
      <div class="page page-hidden" id="page-add">

        <!-- ── Header ── -->
        <header class="app-header">
          <div class="header-left">
            <!-- Back button -->
            <button class="btn-back" id="go-to-list" aria-label="Back to task list">
              <span aria-hidden="true">←</span>
            </button>
            <h2 class="page-title" id="form-page-title">New Task</h2>
          </div>
          <span class="logo-icon-sm" aria-hidden="true">✦</span>
        </header>

        <!-- ── Add Task Form ── -->
        <section class="form-card" aria-label="Add new task">

          <div class="form-grid">
            <!-- Task Name -->
            <div class="input-group span-full">
              <label for="task-name" class="input-label">Task Name</label>
              <div class="input-wrapper">
                <span class="input-icon" aria-hidden="true">📝</span>
                <input
                  type="text"
                  id="task-name"
                  class="form-input"
                  placeholder="What needs to be done?"
                  maxlength="120"
                  autocomplete="off"
                />
              </div>
            </div>

            <!-- Date -->
            <div class="input-group">
              <label for="task-date" class="input-label">Date</label>
              <div class="input-wrapper">
                <span class="input-icon" aria-hidden="true">📅</span>
                <input type="date" id="task-date" class="form-input" />
              </div>
            </div>

            <!-- Time -->
            <div class="input-group">
              <label for="task-time" class="input-label">Time</label>
              <div class="input-wrapper">
                <span class="input-icon" aria-hidden="true">🕐</span>
                <input type="time" id="task-time" class="form-input" />
              </div>
            </div>
          </div>

          <!-- Validation error -->
          <p class="error-msg" id="error-msg" role="alert" aria-live="polite"></p>

          <!-- Submit -->
          <button class="btn-submit" id="add-btn" aria-label="Add task">
            <span aria-hidden="true">✓</span> <span id="submit-btn-text">Save Task</span>
          </button>

          <!-- Cancel link -->
          <button class="btn-cancel" id="cancel-btn">Cancel &amp; go back</button>

        </section>
      </div><!-- /#page-add -->

    </div><!-- /.app-wrapper -->

    <script src="script.js"></script>
  </body>
</html>
